version: '3.8'

services:
  # ==========================================
  # ZEEK NETWORK MONITOR
  # ==========================================
  zeek:
    build: ./zeek
    container_name: zeek-monitor
    cap_add:
      - NET_RAW
      - NET_ADMIN
    network_mode: host
    volumes:
      - ./shared/logs:/zeek/logs
      - ./zeek/scripts:/zeek/scripts:ro
    command: >
      sh -c "echo 'Starting Zeek on eth0...' && 
      mkdir -p /zeek/logs && 
      cd /zeek/logs && 
      zeek -i eth0 -C local /zeek/scripts/crypto-detection.zeek"
    restart: unless-stopped
    depends_on:
      - web-app
      - ssh-service
      - database-service

  # ==========================================
  # PYTHON CBOM ANALYZER & DASHBOARD
  # ==========================================
  analyzer:
    build: ./analyzer
    container_name: cbom-analyzer
    ports:
      - "5001:5000"
    volumes:
      - ./shared/logs:/app/logs
      - ./shared/cbom:/app/cbom
      - ./generate-traffic.sh:/app/generate-traffic.sh:ro
    environment:
      - FLASK_ENV=development
      - FLASK_PORT=5000
      - LOG_PATH=/app/logs
      - CBOM_PATH=/app/cbom
      # Route traffic through Docker host gateway so Zeek (host mode) can see it
      - TRAFFIC_HOST=host.docker.internal
      - WEB_APP_HOST=host.docker.internal
      - WEB_APP_PORT=8443
      - SSH_HOST=host.docker.internal
      - SSH_PORT=2222
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cbom-net
    depends_on:
      - zeek
    restart: unless-stopped

  # ==========================================
  # SAMPLE APP 1: HTTPS WEB APPLICATION
  # ==========================================
  web-app:
    build: ./sample-apps/web-app
    container_name: sample-web-app
    ports:
      - "8443:8443"
    networks:
      - cbom-net
    restart: unless-stopped

  # ==========================================
  # SAMPLE APP 2: SSH SERVICE
  # ==========================================
  ssh-service:
    build: ./sample-apps/ssh-service
    container_name: sample-ssh-service
    ports:
      - "2222:22"
    networks:
      - cbom-net
    restart: unless-stopped

  # ==========================================
  # SAMPLE APP 3: TLS-ENABLED DATABASE
  # ==========================================
  database-service:
    build: ./sample-apps/database-service
    container_name: sample-database-service
    ports:
      - "5432:5432"
      - "6432:6432"
    networks:
      - cbom-net
    environment:
      - POSTGRES_PASSWORD=cbom_demo_pass
      - POSTGRES_DB=crypto_inventory
    restart: unless-stopped

networks:
  cbom-net:
    driver: bridge
